<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Document</title>
    <style>
        @media screen and (max-width: 650px) {
            #template-header {
                background: red;
            }
            #template-footer {
                background:green;
            }
        }
        
        @media screen and (min-width: 651px) {
            #template-header {
                background: purple;
            }
            #template-footer {
                background: yellow;
            }
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="template-header">
            Template Wrapper Header
        </div>
        {{ contents }}
        <div id="template-footer">
            Template Wrapper Footer
        </div>
    </div>
</body>
</html>
